<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VitaEngine - Main</title>
    <link rel="stylesheet" href="./Main.css">
</head>
<body>
    <div id="main">
        <div id="titleBar" class="draggableArea">
            <h3>VitaEngine Main Window</h3>

        <div id="workspace">
            <h1>Main Window (Experimental)</h1>
            <p>Now you can start building the editor shell.</p>
        </div>
    </div>
    <script src="./Main.js"></script>
</body>
</html>
