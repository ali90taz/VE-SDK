<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VitaEngine</title>
    <link rel="stylesheet" href="./Styles/Index.css" text="text/css">
    <link href="https://fonts.googleapis.com/css?family=Nunito:400,700" rel="stylesheet">
    <script type="module" src="./Scripts/Index.js"></script>
</head>
<body>
    <div id="main">
        <div id="overlay">
            <div id="infoWindow">
                <div id="infoWindow-header">
                    <img class="clickableItem circleButton" id="infoWindow-closeButton" src="../../Shared/Assets/closeButton.png" alt="close_button" title="Close Window">
                </div>
                <div id="infoWindow-content">

                </div>
                <div id="infoWindow-footer">
                    <h4 class="normalText" id="infoWindow-version">Version: </h4>
                    <div id="infoWindow-footer-links">
                        
                    </div>
                </div>
            </div>
        </div>
        <div id="sidebar">
            <img class="clickableItem circleButton" id="gitHubButton" src="../../Shared/Assets/veLogo.png" alt="vita_engine_logo" title="">
            <img class="clickableItem circleButton" id="infoButton" src="./Assets/infoIcon.png" alt="info_icon" title="">
        </div>
        <div id="content">
            <div class="draggableArea" id="titleBar" title="">
                <img class="normalImage" src="./Assets/veText.png" alt="vita_engine_text">
                <div id="titleBar-buttons">
                    <img class="clickableItem circleButton undraggableArea" id="minimizeButton" src="../../Shared/Assets/minimizeButton.png" alt="minimize_button" title="">
                    <img class="clickableItem circleButton undraggableArea" id="closeButton" src="../../Shared/Assets/closeButton.png" alt="close_button" title="Close Window">
                </div>
            </div>
            <div id="projectArea">
                <h3 class="normalText" id="projectActions-label"></h3>
                <table id="projectActions">
                    <tr>
                        <td class="link clickableItem" id="newProject" title=""></td>
                    </tr>
                    <tr>
                        <td class="link clickableItem" id="openProject" title=""></td>
                    </tr>
                </table>
                <h3 class="normalText" id="recentProjects-label"></h3>
                <table id="recentProjects">
                    <tr id="noRecentProjects">
                        <td class="normalText" id="noRecentProjects-message"></td>
                    </tr>
                </table>
            </div>
            <div id="footer">
                <h4 class="warnText" id="warningText">
                </h4>
            </div>
        </div>
    </div>
</body>
</html>
